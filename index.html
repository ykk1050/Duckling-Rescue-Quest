<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- 모바일/패드에서 핀치줌·더블탭줌 방지 및 화면 맞춤 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>아기 오리 구출 대작전 (5-1 사회)</title>
<style>
  /* ===== 반응형 캔버스 (Aspect Ratio Letterboxing) =====
     캔버스 내부(가상) 해상도는 800x600(4:3)으로 고정하고,
     CSS로만 화면에 맞춰 비율 유지 스케일링한다.
     남는 공간은 어두운 배경(레터박스)으로 채워진다. */
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #16324a;           /* 레터박스 색 */
    overflow: hidden;              /* 스크롤 자체를 차단 */
    overscroll-behavior: none;     /* 당겨서 새로고침 방지 */
  }
  #game-wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #game {
    /* 4:3 비율을 유지하면서 화면(가로/세로 중 작은 쪽)에 꽉 차게 */
    width:  min(100vw, calc(100vh * 4 / 3));
    height: min(100vh, calc(100vw * 3 / 4));
    /* 패드·폰 가로 모드 대응: vh는 브라우저 주소창 뒤 영역까지 포함해
       위아래가 잘리므로, 지원 브라우저에서는 '실제 보이는 영역' 기준인
       dvh/dvw로 덮어쓴다 (미지원 브라우저는 위의 vh 값 사용) */
    width:  min(100dvw, calc(100dvh * 4 / 3));
    height: min(100dvh, calc(100dvw * 3 / 4));
    display: block;
    background: #7ec8e3;
    touch-action: none;            /* 브라우저의 스크롤/줌 제스처 차단 */
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== 배경음악 컨트롤 =====
     캔버스 밖 레터박스 여백(화면 모서리)에 떠 있는 작은 위젯.
     재생/정지는 아이콘 하나로 토글해 공간을 아끼고, 옆의 슬라이더로 음량만 조절한다. */
  #bgm-controls {
    position: fixed;
    /* 가로 모드에서는 캔버스가 화면 높이를 꽉 채워 위젯이 상단 문제 글줄을
       가릴 수 있으므로, 게임 정보가 없는 왼쪽 아래 모서리에 둔다 */
    bottom: 10px; left: 10px;
    z-index: 1000;
    display: flex; align-items: center; gap: 8px;
    background: rgba(10, 30, 50, 0.6);
    padding: 6px 12px 6px 6px;
    border-radius: 22px;
    -webkit-tap-highlight-color: transparent;
  }
  #bgm-toggle {
    width: 36px; height: 36px; border-radius: 50%;
    border: none; background: #ffd21f; color: #5a3d00;
    font-size: 16px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    flex: none; cursor: pointer; padding: 0;
  }
  #bgm-volume {
    width: 72px; height: 20px; accent-color: #ffd21f; cursor: pointer;
  }

  /* ===== 하단 크레딧 (레터박스 여백, 게임 화면을 가리지 않음) ===== */
  #credit {
    position: fixed;
    bottom: 4px; left: 50%; transform: translateX(-50%);
    z-index: 999;
    color: rgba(255, 255, 255, 0.45);
    font: 12px 'Malgun Gothic', sans-serif;
    pointer-events: none;
    white-space: nowrap;
  }

  /* ===== 랭킹 UI (게임오버 등록 창 + 명예의 전당) ===== */
  #board-open {
    position: fixed; bottom: 10px; left: 152px; z-index: 1000;
    height: 48px; padding: 0 16px; border: none; border-radius: 24px;
    background: rgba(10, 30, 50, 0.6); color: #ffd21f;
    font: bold 15px 'Malgun Gothic', sans-serif; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .ovl {
    position: fixed; inset: 0; z-index: 1001;
    display: flex; align-items: center; justify-content: center;
    background: rgba(5, 20, 35, 0.55);
  }
  .ovl.hidden { display: none; }
  .ovl .card {
    background: #12293d; border: 2px solid #ffd21f; border-radius: 14px;
    padding: 16px 18px; width: min(92vw, 400px); max-height: 86vh; overflow-y: auto;
    color: #eaf4fb; font: 15px 'Malgun Gothic', sans-serif;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
  }
  .ovl h3 { margin: 0 0 10px; color: #ffd21f; font-size: 19px; }
  .ovl .warn {
    background: rgba(214, 48, 49, 0.18); border: 1px solid #d63031;
    border-radius: 8px; padding: 8px 10px; margin: 10px 0;
    color: #ffb3b3; font-size: 13px; line-height: 1.55;
  }
  .ovl input[type="text"] {
    width: 100%; box-sizing: border-box; padding: 9px 10px; margin: 4px 0 10px;
    border: 1px solid #4a6a88; border-radius: 8px;
    background: #0c1e30; color: #fff; font-size: 16px;
  }
  .ovl .btn-row { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
  .ovl button {
    padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer;
    font: bold 15px 'Malgun Gothic', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  .ovl button.primary { background: #ffd21f; color: #5a3d00; }
  .ovl button.ghost { background: #2c4a66; color: #d9ecf7; }
  .ovl button:disabled { opacity: 0.5; cursor: default; }
  .ovl .status { margin-top: 10px; font-size: 13px; color: #9ecbe8; min-height: 18px; line-height: 1.5; }
  .ovl .tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  .ovl .tabs button { padding: 5px 10px; font-size: 13px; border-radius: 14px; background: #2c4a66; color: #d9ecf7; }
  .ovl .tabs button.on { background: #ffd21f; color: #5a3d00; }
  .ovl ol { margin: 6px 0; padding-left: 26px; }
  .ovl ol li { padding: 3px 0; font-size: 14px; }
  .ovl ol li b { color: #ffe9a8; }
  .ovl .summary { background: #0c1e30; border-radius: 8px; padding: 8px 12px; font-size: 14px; line-height: 1.7; }
  .ovl .note { font-size: 12px; color: #7fa8c9; margin: 4px 0 8px; }
</style>
</head>
<body>
<div id="game-wrap"><canvas id="game"></canvas></div>

<div id="bgm-controls">
  <button id="bgm-toggle" type="button" aria-label="배경음악 재생·정지">▶</button>
  <input id="bgm-volume" type="range" min="0" max="100" value="50" aria-label="배경음악 음량">
</div>
<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>

<!-- 하단 크레딧 -->
<div id="credit">Created by gamtudyssam using AI 0.00071</div>

<!-- 랭킹 보기 버튼 (BGM 위젯 옆) -->
<button id="board-open" type="button">🏆 랭킹</button>

<!-- 게임오버: 랭킹 등록 창 -->
<div id="rank-panel" class="ovl hidden">
  <div class="card">
    <h3>🏆 랭킹 등록</h3>
    <div class="summary" id="rank-summary"></div>
    <div class="warn">⚠️ 닉네임에 <b>실명, 전화번호, 학교·반·번호</b> 같은
      개인정보를 절대 넣지 마세요!<br>별명만 사용해요. (예: 날쌘오리, 연못지킴이)</div>
    <div id="rank-step1">
      <input id="rank-nick" type="text" maxlength="10" placeholder="닉네임 (2~10자)" autocomplete="off">
      <div class="btn-row">
        <button class="ghost" id="rank-close1" type="button">등록 안 함</button>
        <button class="primary" id="rank-submit1" type="button">랭킹 등록</button>
      </div>
    </div>
    <div id="rank-step2" style="display:none">
      <p id="rank-confirm-text" style="margin:6px 0 12px; line-height:1.7;"></p>
      <div class="btn-row">
        <button class="ghost" id="rank-back" type="button">다시 입력</button>
        <button class="primary" id="rank-submit2" type="button">네, 등록할게요</button>
      </div>
    </div>
    <div class="status" id="rank-status"></div>
  </div>
</div>

<!-- 명예의 전당 (랭킹 보기) -->
<div id="board-panel" class="ovl hidden">
  <div class="card">
    <h3>🏆 명예의 전당</h3>
    <div class="tabs" id="board-tabs"></div>
    <div class="note" id="board-note"></div>
    <div id="board-list">불러오는 중...</div>
    <div class="btn-row" style="margin-top:10px">
      <button class="ghost" id="board-refresh" type="button">새로고침</button>
      <button class="ghost" id="board-close" type="button">닫기</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ============================================================
 * [1] 설정 변수 (Config) — 수정은 여기서만!
 * ============================================================ */
const CONFIG = {
  // 화면(뷰포트)의 가상 해상도 (기기 화면 크기와 무관한 기준 좌표계)
  W: 800,
  H: 600,

  // 전체 맵(월드) 크기 — 화면의 가로 2배 x 세로 2배 (화면 4개 넓이)
  // 맵 끝과 끝은 이어져 있다(도넛 모양 벽 통과). 크기 조절은 여기서.
  WORLD_W: 1600,
  WORLD_H: 1200,

  // 카메라 (엄마 오리를 부드럽게 따라다님)
  CAMERA_FOLLOW: 6,       // 클수록 카메라가 빨리 따라붙음

  // 엄마 오리
  DUCK_RADIUS: 16,        // 엄마 오리 반지름 (가상 px)
  DUCK_SPEED: 170,        // 기본 이동 속도 (가상 px / 초)
  SPEED_PER_RESCUE: 4,    // 아기 오리 1마리 구출마다 속도 증가량
  MAX_SPEED: 260,         // 최대 속도

  // 오리 스프라이트 시트 (mother_duck.png / baby_duck.png : 가로 6칸 x 세로 2칸 균일 격자)
  SPRITE: {
    SRC: "mother_duck.png",
    BABY_SRC: "baby_duck.png", // 아기 오리(꼬리 행렬)용 시트 — 격자 구조는 엄마와 동일
    COLS: 6,              // 가로 등분 수 → 1칸 너비 sWidth = 이미지 너비 / COLS (자동 계산)
    ROWS: 2,              // 세로 등분 수 → 1칸 높이 sHeight = 이미지 높이 / ROWS (자동 계산)
    FRAME_TIME: 0.2,      // 걷기 애니메이션 프레임 전환 간격 (초)
    DRAW_H: 72,           // 엄마 오리를 화면에 그릴 세로 크기 (가상 px, 가로는 칸 비율 자동)
    BABY_DRAW_H: 46,      // 아기 오리를 화면에 그릴 세로 크기 (가상 px)
    WHITE_THRESHOLD: 240, // R·G·B가 모두 이 값 이상인 픽셀은 흰 배경으로 보고 투명 처리
  },

  // 아기 오리(꼬리)
  DUCKLING_RADIUS: 10,    // 아기 오리 반지름
  TAIL_SPACING: 34,       // 행렬 간격 (가상 px)
  TAIL_SAFE_COUNT: 2,     // 머리 바로 뒤 몇 마리는 충돌 판정 제외(코너 오판 방지)

  // 보기 상자
  BOX_W: 96,
  BOX_H: 58,
  BOX_LABEL_FONT: 24,     // 상자 위 보기 글씨 크기 (패드 가독성 확보)
  BOX_MIN_DIST_FROM_DUCK: 320, // 스폰 시 엄마 오리와의 최소 거리
  BOX_MIN_DIST_BETWEEN: 360,   // 상자끼리의 최소 거리 (맵에 흩어지게)

  // 오답 페널티: 틀린 상자에서 늑대가 튀어나온다!
  // (첫 번째 문제를 틀리면 바로 게임 오버)

  // 장애물 (시간이 지날수록 하나씩 추가됨: 바위 → 늑대 → 바위 → ...)
  HAZARD_START_DELAY: 12, // 첫 장애물이 나타나는 시각 (초)
  HAZARD_INTERVAL: 14,    // 이후 장애물 추가 간격 (초)
  MAX_ROCKS: 5,           // 바위 최대 개수
  MAX_WOLVES: 3,          // 늑대 최대 마리 수
  ROCK_RADIUS: 26,        // 바위 반지름
  WOLF_RADIUS: 17,        // 늑대 반지름
  WOLF_SPEED: 105,        // 늑대 추격 속도 (오리보다 느려서 도망칠 수 있음)
  HAZARD_MIN_DIST: 420,   // 장애물 스폰 시 오리와의 최소 거리
  HIT_INVINCIBLE: 1.5,    // 장애물 피격 후 무적 시간 (초)
  WOLF_WARN_DIST: 520,    // 화면 밖 늑대 경고 화살표를 띄우는 거리

  // 화면 밖 안내 화살표
  ARROW_EDGE_MARGIN: 52,  // 화살표가 화면 가장자리에서 떨어진 거리
  ARROW_LABEL_FONT: 20,   // 화살표 옆 글씨 크기

  // 상단 질문 UI 영역 높이 (질문이 길면 2줄로 표시)
  UI_TOP: 100,

  // 문제 제한 시간
  QUESTION_TIME: 90,      // 한 문제를 풀 수 있는 시간 (초) = 1분 30초
  TIME_WARN: 10,          // 남은 시간이 이 값 이하면 빨간색 경고

  // 조작
  SWIPE_THRESHOLD: 24,    // 스와이프 인식 최소 거리 (가상 px 기준 → 기기 무관 동일 감도)

  // 가상 방향키 (터치 기기에서 표시되는 반투명 십자 패드)
  DPAD: {
    CX: 700,              // 패드 중심 x (가상 px, 화면 오른쪽 아래 구석)
    CY: 490,              // 패드 중심 y
    BTN: 52,              // 버튼 한 변 크기
    GAP: 58,              // 중심에서 각 버튼 중심까지 거리
    ALPHA: 0.38,          // 평소 투명도 (게임 화면을 가리지 않도록 반투명)
  },

  // 피드백 텍스트
  FEEDBACK_LIFE: 1.1,     // 떠 있는 시간(초)
  LOST_DUCK_LIFE: 1.3,    // 잃은 아기 오리가 떠내려가며 사라지는 시간(초)

  // 점수
  SCORE_RESCUE: 100,      // 아기 오리 1마리 구출 기본 점수
  SCORE_COMBO_BONUS: 20,  // 연속 구출(콤보) 1단계마다 추가되는 보너스 점수
  SCORE_COMBO_MAX: 100,   // 콤보 보너스 상한 (기본+보너스 = 최대 200점)
  SCORE_WRONG: 50,        // 오답(시간 초과 포함) 감점
  SCORE_LOST_DUCK: 20,    // 늑대·바위에게 아기 오리를 잃을 때 1마리당 감점

  // 늑대에게 잡히면 아기 오리의 1/5(올림)이 잡혀가거나 도망친다.
  // 5마리 이하일 때는 자동으로 1마리만 잃는다. (Math.ceil(마리수/5))
  WOLF_STEAL_DIV: 5,

  // 랭킹 서버 — Google Apps Script 웹 앱 배포 URL(/exec로 끝남)을 붙여넣으세요.
  // 배포 방법은 같은 폴더의 ranking_appscript.gs 파일 맨 위 안내 참고.
  // 비워두면 랭킹 등록/보기 창에 안내 문구만 표시된다.
  RANKING_URL: "https://script.google.com/macros/s/AKfycbxWm3wCekLEWEF7wCM3X0qB70_1ccnvpQNVOdYtRNlu2MqkP43sS4hdeunpZFNsUxo7fg/exec",
};

/* ============================================================
 * [2] 단원별 문제 데이터 — 문제 수정/추가는 여기서만!
 *     형식: [질문, 보기1, 보기2, 보기3, 정답 번호(0부터 시작)]
 *     ※ 출제될 때마다 보기 순서가 자동으로 섞이므로,
 *       여기의 정답 번호는 "정답 보기가 몇 번째에 적혀 있는지"만 뜻한다.
 * ============================================================ */
const UNITS = [
  { name: "1단원", title: "우리나라의 지형과 독도", questions: [
    ["우리 국토의 약 몇 %가 산지로 이루어져 있나요?", "50%", "60%", "70%", 2],
    ["우리나라 지형은 전체적으로 어느 쪽이 높고 어느 쪽이 낮나요?", "북동쪽이 높고 남서쪽이 낮다", "남서쪽이 높고 북동쪽이 낮다", "서쪽이 높고 동쪽이 낮다", 0],
    ["우리나라 대부분의 큰 하천은 지형의 영향으로 어느 방향으로 흐르나요?", "북쪽과 동쪽", "남쪽과 서쪽", "동쪽과 남쪽", 1],
    ["산지, 하천, 해안 등 다양한 땅의 생김새를 무엇이라 하나요?", "기후", "지형", "영토", 1],
    ["산지 지형에 대한 설명으로 옳은 것은?", "높이 솟은 산들이 모여 이룬 지형이다", "하천 주변에 발달한 평평한 땅이다", "바다와 육지가 맞닿은 곳이다", 0],
    ["하천 하류 주변에 주로 발달하며 농경지로 이용되는 평평하고 넓은 땅은?", "산지", "평야", "해안", 1],
    ["독도는 우리나라 영토의 어느 쪽 끝에 있나요?", "서쪽 끝", "동쪽 끝", "남쪽 끝", 1],
    ["독도가 속해 있는 행정 구역은 어디인가요?", "강원특별자치도 울릉군", "경상북도 울릉군", "전라남도 신안군", 1],

/* ---- 문제 출제: 전체 단원에서 무작위 + 보기 순서도 매번 섞기 ---- */
let currentQ = null;   // { unit, text, choices, answer }
let lastPick = null;   // 직전 문제 기억 (같은 문제 연속 출제 방지)

function shuffle3() {  // [0,1,2]를 무작위로 섞은 배열 (Fisher-Yates)
  const a = [0, 1, 2];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function nextQuestion() {
  let u, i, guard = 0;
  do {
    u = Math.floor(Math.random() * UNITS.length);
    i = Math.floor(Math.random() * UNITS[u].questions.length);
    guard++;
  } while (guard < 10 && lastPick && lastPick.u === u && lastPick.i === i);
  lastPick = { u, i };
  const raw = UNITS[u].questions[i];
  const order = shuffle3(); // 같은 문제라도 나올 때마다 보기 순서(=정답 위치)가 바뀐다
  currentQ = {
    unit: u,
    text: raw[0],
    choices: order.map(k => raw[1 + k]),
    answer: order.indexOf(raw[4]),
  };
  questionTimeLeft = CONFIG.QUESTION_TIME; // 새 문제 → 제한 시간 리셋
}

/* ---- 단원별 정답률 (localStorage: 이 기기 브라우저에 계속 저장) ---- */
const STATS_KEY = "duckRescueUnitStats_v1";

function loadStats() {
  try { return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
  catch (e) { return {}; }
}
let stats = loadStats();

function recordAnswer(unitIdx, correct) {
  const k = String(unitIdx);
  if (!stats[k]) stats[k] = { c: 0, t: 0 };
  stats[k].t++;
  if (correct) stats[k].c++;
  try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch (e) {}
}

function resetStats() {
  stats = {};
  try { localStorage.removeItem(STATS_KEY); } catch (e) {}
}

// "1단원 우리나라의 지형과 독도: 정답률 80% (16/20)" 형태 문자열
function statText(unitIdx) {
  const u = UNITS[unitIdx];
  const s = stats[String(unitIdx)];
  if (!s || s.t === 0) return `${u.name} ${u.title}: 아직 기록 없음`;
  return `${u.name} ${u.title}: 정답률 ${Math.round(s.c / s.t * 100)}% (${s.c}/${s.t})`;
}

/* ============================================================
 * [3.5] 대장 오리 스프라이트 시트 (mother_duck.png)
 *   - 이미지를 파일로 쪼개지 않고 ctx.drawImage(img, sx, sy, sW, sH, dx, dy, dW, dH)
 *     소스 크롭으로 필요한 칸만 실시간으로 잘라 그린다.
 *   - 1칸 크기(sWidth/sHeight)는 로드된 원본 크기를 COLS/ROWS로 나눠 자동 계산.
 *   - 로드 직후 흰 배경(R·G·B ≥ WHITE_THRESHOLD)을 투명 처리(크로마키)한
 *     오프스크린 캔버스를 만들어 두고, 매 프레임 그 캔버스에서 잘라 그린다.
 * ============================================================ */
class DuckSprite {
  constructor(src, cols, rows) {
    this.cols = cols;
    this.rows = rows;
    this.ready = false;      // 이미지 로드+가공 완료 여부 (전엔 도형 폴백)
    this.dirName = "right";  // 현재 바라보는 방향
    this.frameIndex = 0;     // 현재 걷기 프레임
    this.timer = 0;          // 프레임 전환 타이머(초)

    // 방향별로 사용할 격자 칸 목록 [열 c, 행 r]
    // 1행(r=0): 정면/오른쪽 | 2행(r=1): 뒷모습/왼쪽
    // ※ 1행의 오른쪽 보기 칸들(c2~c5)은 몸을 살짝 튼 3/4 시점이라
    //   게임 크기로 축소하면 왼쪽을 보는 것처럼 읽히는 착시가 있다.
    //   그래서 오른쪽 이동은 방향이 또렷한 2행 왼쪽 옆모습(c3~c5)을
    //   좌우 반전(flipX)해서 사용한다. (게임에서 흔히 쓰는 기법)
    this.anims = {
      down:  [{ c: 0, r: 0 }, { c: 1, r: 0 }],                 // 정면 걷기
      right: [{ c: 3, r: 1 }, { c: 4, r: 1 }, { c: 5, r: 1 }], // 왼쪽 옆모습을 반전해 오른쪽으로
      up:    [{ c: 0, r: 1 }, { c: 1, r: 1 }, { c: 2, r: 1 }], // 뒷모습 걷기 (기본)
      left:  [{ c: 3, r: 1 }, { c: 4, r: 1 }, { c: 5, r: 1 }], // 왼쪽 걷기
      upAlt: [{ c: 4, r: 0 }, { c: 5, r: 0 }],                 // 예비: 1행 원본 오른쪽 칸 (미사용)
    };
    this.flipX = { right: true }; // 이 방향들은 그릴 때 좌우 반전

    const img = new Image();
    img.onload = () => {
      this.sw = img.width  / this.cols;  // sWidth  자동 계산
      this.sh = img.height / this.rows;  // sHeight 자동 계산
      this.sheet = this.makeTransparent(img);
      this.ready = true;
    };
    img.src = src;
  }

  // 흰 배경 → 투명 (크로마키). 픽셀을 한 번만 가공해 두고 계속 재사용한다.
  makeTransparent(img) {
    const off = document.createElement("canvas");
    off.width = img.width; off.height = img.height;
    const octx = off.getContext("2d");
    octx.drawImage(img, 0, 0);
    try {
      const data = octx.getImageData(0, 0, off.width, off.height);
      const px = data.data;
      // 이미 투명 배경인 이미지(알파 0 픽셀 존재)는 흰색 제거를 건너뛴다
      // — 눈의 흰자위처럼 그림 '안쪽'의 흰색까지 뚫리는 것을 방지
      let alreadyTransparent = false;
      for (let i = 3; i < px.length; i += 4) {
        if (px[i] === 0) { alreadyTransparent = true; break; }
      }
      if (!alreadyTransparent) {
        const th = CONFIG.SPRITE.WHITE_THRESHOLD;
        for (let i = 0; i < px.length; i += 4) {
          // R·G·B가 모두 기준값 이상 = 흰 배경 → 알파 0 (완전 투명)
          if (px[i] >= th && px[i + 1] >= th && px[i + 2] >= th) px[i + 3] = 0;
        }
        octx.putImageData(data, 0, 0);
      }
      this.computeOffsets(data);
      return off;
    } catch (e) {
      // file:// 로 직접 열면 보안 정책 때문에 픽셀 접근이 막힐 수 있음
      // → 투명화·중심 보정 없이 원본 이미지 그대로 사용 (게임은 정상 동작)
      console.warn("스프라이트 픽셀 가공 실패(로컬 보안 정책). 로컬 서버로 열면 완전하게 표시됩니다.", e);
      this.offsets = null;
      return img;
    }
  }

  // 칸마다 오리 그림이 정중앙에 있지 않아 프레임 전환 시 위치가 튀는 문제 보정:
  // 각 칸에서 비투명 픽셀의 중심이 칸 중심에서 얼마나 벗어났는지 미리 계산해 두고,
  // 그릴 때 그만큼 반대로 밀어 어느 프레임이든 오리가 같은 자리에 그려지게 한다.
  computeOffsets(data) {
    this.offsets = [];
    const W = data.width, px = data.data;
    const cw = Math.floor(this.sw), ch = Math.floor(this.sh);
    for (let r = 0; r < this.rows; r++) {
      const row = [];
      for (let c = 0; c < this.cols; c++) {
        const x0 = Math.floor(c * this.sw), y0 = Math.floor(r * this.sh);
        let minX = Infinity, maxX = -1, minY = Infinity, maxY = -1;
        for (let y = 0; y < ch; y++) {
          for (let x = 0; x < cw; x++) {
            if (px[((y0 + y) * W + (x0 + x)) * 4 + 3] > 8) { // 알파 있는 픽셀만
              if (x < minX) minX = x;
              if (x > maxX) maxX = x;
              if (y < minY) minY = y;
              if (y > maxY) maxY = y;
            }
          }
        }
        row.push(maxX < 0 ? { ox: 0, oy: 0 } : {
          ox: (minX + maxX) / 2 - this.sw / 2, // 그림 중심의 가로 치우침 (px)
          oy: (minY + maxY) / 2 - this.sh / 2, // 그림 중심의 세로 치우침 (px)
        });
      }
      this.offsets.push(row);
    }
  }

  // 이동 방향 벡터 → 방향 이름. 방향이 바뀌면 걷기 프레임을 처음부터 다시 시작.
  setDirFromVector(dx, dy) {
    const name = dy > 0 ? "down" : dy < 0 ? "up" : dx < 0 ? "left" : "right";
    if (name !== this.dirName) {
      this.dirName = name;
      this.frameIndex = 0;
      this.timer = 0;
    }
  }

  // FRAME_TIME(0.2초)마다 배정된 칸들을 순환 → 뒤뚱뒤뚱 걷기 모션
  update(dt) {
    this.timer += dt;
    while (this.timer >= CONFIG.SPRITE.FRAME_TIME) {
      this.timer -= CONFIG.SPRITE.FRAME_TIME;
      this.frameIndex++;
    }
  }

  // (x, y) 중심으로 현재 방향·프레임의 칸을 잘라 그린다.
  // drawH: 화면에 그릴 세로 크기. 가로는 칸의 원본 비율을 유지해 자동 계산.
  // 그리기에 성공하면 true (아직 로드 전이면 false → 호출부에서 도형 폴백)
  // frameOffset: 행렬 속 아기 오리들이 똑같이 발맞추지 않고 서로 다른
  // 걸음 프레임으로 뒤뚱거리게 하는 어긋남 값 (기본 0)
  draw(ctx, x, y, drawH, dirName, frameOffset = 0) {
    if (!this.ready) return false;
    const dn = dirName || this.dirName;
    const frames = this.anims[dn];
    const f = frames[(this.frameIndex + frameOffset) % frames.length];
    const drawW = drawH * (this.sw / this.sh); // 칸 비율 유지
    const scale = drawH / this.sh;
    // 칸 안에서 그림이 치우친 만큼 반대로 밀어, 프레임이 바뀌어도 오리가 흔들리지 않게
    const off = this.offsets ? this.offsets[f.r][f.c] : { ox: 0, oy: 0 };
    ctx.save();
    ctx.translate(x, y);                       // (x, y)를 원점으로
    if (this.flipX[dn]) ctx.scale(-1, 1);      // 필요한 방향은 좌우 반전해서 그림
    ctx.drawImage(
      this.sheet,
      f.c * this.sw, f.r * this.sh, this.sw, this.sh,             // 소스 크롭 (sx, sy, sW, sH)
      -drawW / 2 - off.ox * scale, -drawH / 2 - off.oy * scale,   // 목적지 (dx, dy) — 원점 중심
      drawW, drawH                                                // 목적지 크기 (dW, dH)
    );
    ctx.restore();
    return true;
  }
}

const duckSprite = new DuckSprite(CONFIG.SPRITE.SRC, CONFIG.SPRITE.COLS, CONFIG.SPRITE.ROWS);
// 아기 오리(꼬리 행렬)용 시트 — 격자 구조·방향 배치가 엄마와 동일해 같은 클래스 재사용
const babySprite = new DuckSprite(CONFIG.SPRITE.BABY_SRC, CONFIG.SPRITE.COLS, CONFIG.SPRITE.ROWS);

/* ============================================================
 * [4] 좌표 보정 — 화면 좌표 → 캔버스 가상 좌표
 *     getBoundingClientRect()로 실제 표시 크기를 얻어
 *     가상 해상도와의 비율로 환산한다. (레터박스/축소 화면 대응)
 * ============================================================ */
function toCanvasXY(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (CONFIG.W / rect.width),
    y: (clientY - rect.top)  * (CONFIG.H / rect.height),
  };
}

/* ============================================================
 * [5] 월드 좌표 도우미 (도넛형 맵: 끝과 끝이 이어짐)
 * ============================================================ */
function mod(v, size) { return ((v % size) + size) % size; }

// 두 지점의 차이를 "가장 가까운 방향"으로 계산 (맵 경계를 넘어가는 지름길 포함)
function wrapDelta(d, size) {
  return mod(d + size / 2, size) - size / 2;
}

// 월드 좌표 → 화면(가상 해상도) 좌표. 카메라 기준으로 가장 가까운 사본 위치를 반환.
function worldToScreen(wx, wy) {
  return {
    x: VIEW_CX + wrapDelta(wx - cam.x, CONFIG.WORLD_W),
    y: VIEW_CY + wrapDelta(wy - cam.y, CONFIG.WORLD_H),
  };
}

// 월드 기준 두 점 사이 거리 (벽 통과 지름길 반영)
function worldDist(x1, y1, x2, y2) {
  return Math.hypot(wrapDelta(x1 - x2, CONFIG.WORLD_W), wrapDelta(y1 - y2, CONFIG.WORLD_H));
}

/* ============================================================
 * [7] 스폰 — 보기 상자 / 장애물(바위·늑대)
 * ============================================================ */
// 오리·기존 물체들과 충분히 떨어진 무작위 월드 좌표 찾기
function randomWorldPos(minDistFromDuck, avoidList, avoidDist) {
  let x, y, tries = 0;
  do {
    x = Math.random() * CONFIG.WORLD_W;
    y = Math.random() * CONFIG.WORLD_H;
    tries++;
  } while (
    tries < 200 &&
    ( worldDist(x, y, duck.x, duck.y) < minDistFromDuck ||
      avoidList.some(o => worldDist(x, y, o.x, o.y) < avoidDist) )
  );
  return { x, y };
}

function spawnBoxes() {
  boxes = [];
  for (let i = 0; i < currentQ.choices.length; i++) {
    // 다른 상자·바위와 겹치지 않는 자리에 배치
    const avoid = boxes.map(b => ({ x: b.cx, y: b.cy })).concat(rocks || []);
    const p = randomWorldPos(CONFIG.BOX_MIN_DIST_FROM_DUCK, avoid,
      boxes.length ? CONFIG.BOX_MIN_DIST_BETWEEN : 170);
    boxes.push({ cx: p.x, cy: p.y, w: CONFIG.BOX_W, h: CONFIG.BOX_H, choice: i });
  }
}

// 시간이 지나면 바위 → 늑대 → 바위 → ... 순서로 하나씩 추가
function spawnHazard() {
  const total = rocks.length + wolves.length;
  const wantWolf = total % 2 === 1; // 홀수 번째(2,4,...)는 늑대
  const avoid = rocks.concat(boxes.map(b => ({ x: b.cx, y: b.cy })));
  if (wantWolf && wolves.length < CONFIG.MAX_WOLVES) {
    const p = randomWorldPos(CONFIG.HAZARD_MIN_DIST, avoid, 150);
    wolves.push({ x: p.x, y: p.y, ang: 0 });
    addFeedback("늑대가 나타났다!", VIEW_CX, VIEW_CY - 90, "#d63031");
  } else if (rocks.length < CONFIG.MAX_ROCKS) {
    const p = randomWorldPos(CONFIG.HAZARD_MIN_DIST, avoid, 180);
    rocks.push({ x: p.x, y: p.y, r: CONFIG.ROCK_RADIUS });
  } else if (wolves.length < CONFIG.MAX_WOLVES) {
    const p = randomWorldPos(CONFIG.HAZARD_MIN_DIST, avoid, 150);
    wolves.push({ x: p.x, y: p.y, ang: 0 });
    addFeedback("늑대가 나타났다!", VIEW_CX, VIEW_CY - 90, "#d63031");
  }
}

/* ============================================================
 * [8] 입력 처리 — 키보드(PC) + 스와이프/드래그(패드·폰) + 버튼 터치
 *     Pointer Events로 마우스/터치를 통합 처리하고,
 *     touch 이벤트에는 preventDefault로 화면 스크롤 버그를 차단.
 * ============================================================ */
// 입력을 큐에 순서대로 쌓는다. (빠르게 연속 입력해도 앞의 입력이 덮어써져
// 사라지지 않고, 한 프레임에 하나씩 차례대로 적용된다 → 즉각적인 조작감)
function setDir(nx, ny) {
  const last = dirQueue.length ? dirQueue[dirQueue.length - 1] : dir;
  if (last.x === nx && last.y === ny) return; // 직전 입력과 같으면 무시 (키 반복 등)
  dirQueue.push({ x: nx, y: ny });
  if (dirQueue.length > 3) dirQueue.shift(); // 너무 오래된 입력은 버림
}

// 키보드 (방향키 + WASD)
window.addEventListener("keydown", (e) => {
  const map = {
    ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
    w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
  };
  if (map[e.key]) {
    e.preventDefault(); // 방향키로 페이지가 스크롤되는 것 방지
    if (state === "playing") setDir(map[e.key][0], map[e.key][1]);
  }
  if ((e.key === "Enter" || e.key === " ") && state !== "playing") {
    e.preventDefault();
    if (state === "paused") resumeGame(); // 일시정지 중엔 이어서 하기
    else startGame();
  }
});

// 스와이프/드래그 (Pointer Events: 마우스+터치 공용)
let swipe = { active: false, x: 0, y: 0 };

canvas.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  const p = toCanvasXY(e.clientX, e.clientY); // ★ 좌표 보정
  if (state === "start") {
    if (hitButton(BUTTONS.start, p)) startGame();
    else if (hitButton(BUTTONS.reset, p)) resetStats(); // 단원별 기록 지우기
    return;
  }
  if (state === "gameover") {
    if (hitButton(BUTTONS.restart, p)) startGame();
    return;
  }
  if (state === "paused") {
    if (hitButton(BUTTONS.resume, p)) resumeGame();
    return;
  }
  // 가상 방향키를 눌렀으면 방향 전환 (스와이프 시작으로 취급하지 않음)
  if (SHOW_DPAD) {
    const d = hitDpad(p);
    if (d) {
      setDir(d.x, d.y);
      dpadFlash = { dir: d, until: performance.now() / 1000 + 0.2 };
      return;
    }
  }
  swipe = { active: true, x: p.x, y: p.y };
});

canvas.addEventListener("pointermove", (e) => {
  if (!swipe.active || state !== "playing") return;
  const p = toCanvasXY(e.clientX, e.clientY);
  const dx = p.x - swipe.x, dy = p.y - swipe.y;
  if (Math.hypot(dx, dy) >= CONFIG.SWIPE_THRESHOLD) {
    if (Math.abs(dx) > Math.abs(dy)) setDir(Math.sign(dx), 0);
    else                             setDir(0, Math.sign(dy));
    // 기준점을 갱신 → 손을 떼지 않고 연속으로 방향 전환(드래그 조향) 가능
    swipe.x = p.x; swipe.y = p.y;
  }
});

["pointerup", "pointercancel"].forEach(t =>
  canvas.addEventListener(t, () => { swipe.active = false; })
);

// 모바일 브라우저 고유의 스크롤/새로고침/줌 제스처 완전 차단
["touchstart", "touchmove", "touchend"].forEach(t =>
  canvas.addEventListener(t, (e) => e.preventDefault(), { passive: false })
);

function hitButton(b, p) {
  return p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h;
}

/* ---- 가상 방향키 (터치 기기에서 표시되는 반투명 십자 패드) ---- */
// 터치가 가능한 기기(스마트패드·폰·터치 노트북)에서만 표시
let SHOW_DPAD = ("ontouchstart" in window) ||
  (window.matchMedia && matchMedia("(pointer: coarse)").matches);
const DPAD_DIRS = [
  { x: 0, y: -1 }, { x: 1, y: 0 }, { x: 0, y: 1 }, { x: -1, y: 0 },
];
let dpadFlash = { dir: null, until: 0 }; // 방금 누른 버튼을 잠깐 밝게 표시

function dpadBtnCenter(d) {
  return {
    x: CONFIG.DPAD.CX + d.x * CONFIG.DPAD.GAP,
    y: CONFIG.DPAD.CY + d.y * CONFIG.DPAD.GAP,
  };
}

// 터치 지점이 어느 방향 버튼 위인지 (없으면 null). 손가락 오차를 위해 넉넉히 판정.
function hitDpad(p) {
  const half = CONFIG.DPAD.BTN / 2 + 8;
  for (const d of DPAD_DIRS) {
    const c = dpadBtnCenter(d);
    if (Math.abs(p.x - c.x) <= half && Math.abs(p.y - c.y) <= half) return d;
  }
  return null;
}

function startGame() {
  hideRankPanel();  // 열려 있던 랭킹 창들은 닫고 시작
  hideBoardPanel();
  initGame();
  state = "playing";
  playBgm(); // 버튼 클릭(사용자 제스처) 시점이라 브라우저 자동재생 차단에 걸리지 않는다
}

/* ============================================================
 * [BGM] 배경음악 재생/정지 토글 + 음량 조절 (localStorage에 설정 저장)
 * ============================================================ */

const bgmVolumeSlider = document.getElementById("bgm-volume");

(function initBgm() {

  bgm.volume = vol / 100;
})();

function playBgm() {
  if (bgmUserPaused) return; // 사용자가 일부러 꺼둔 상태면 자동으로 다시 켜지 않음
  bgm.play().catch(() => {}); // 자동재생이 막혀도 조용히 무시 (토글 버튼으로 재생 가능)
}

function updateBgmToggleIcon() {
  bgmToggle.textContent = bgm.paused ? "▶" : "⏸";
}

bgmToggle.addEventListener("click", () => {
  if (bgm.paused) { bgmUserPaused = false; bgm.play().catch(() => {}); }
  else            { bgmUserPaused = true;  bgm.pause(); }
});
bgm.addEventListener("play", updateBgmToggleIcon);
bgm.addEventListener("pause", updateBgmToggleIcon);

bgmVolumeSlider.addEventListener("input", () => {
  const v = Number(bgmVolumeSlider.value);
  bgm.volume = v / 100;
  try { localStorage.setItem(BGM_VOLUME_KEY, String(v)); } catch (e) {}
});

// 첫 화면에서도 아무 키/터치나 누르면 바로 배경음악이 흐르도록 (시작 버튼 전에도 대응)
window.addEventListener("keydown", () => playBgm(), { once: true });
canvas.addEventListener("pointerdown", () => playBgm(), { once: true });

/* ============================================================
 * [8.5] 자동 일시정지 / 이어서 하기
 *   다른 탭·앱으로 화면을 바꾸거나 창을 내리면 게임과 음악을 멈추고,
 *   돌아왔을 때 "이어서 하기" 화면에서 이어서 할 수 있다.
 * ============================================================ */
let bgmAutoPaused = false; // 자동 일시정지가 음악을 멈췄는지 (수동 정지와 구분)

function pauseGame() {
  if (state !== "playing") return; // 시작·게임오버 화면에서는 멈출 것이 없음
  state = "paused";
  bgmAutoPaused = !bgm.paused;     // 재개할 때 음악을 다시 켤지 기억
  bgm.pause();
}

function resumeGame() {
  if (state !== "paused") return;
  dirQueue = [];        // 멈춘 사이 쌓인 방향 입력은 버림 (재개 직후 오작동 방지)
  swipe.active = false;
  state = "playing";
  if (bgmAutoPaused && !bgmUserPaused) bgm.play().catch(() => {});
  bgmAutoPaused = false;
}

// 탭 전환·앱 전환·창 최소화 감지
document.addEventListener("visibilitychange", () => {
  if (document.hidden) pauseGame();
});
// 다른 창을 클릭해 포커스를 잃었을 때 (탭은 그대로 보여도 조작 불가 상태)
window.addEventListener("blur", pauseGame);

/* ============================================================
 * [9] 게임 로직 업데이트
 * ============================================================ */
function update(dt) {
  gameTime += dt;

  // 시간 경과에 따른 장애물 추가
  if (gameTime >= nextHazardAt) {
    spawnHazard();
    nextHazardAt += CONFIG.HAZARD_INTERVAL;
  }

  // 방향 적용: 큐에서 유효한 입력을 하나 꺼내 적용 (프레임당 1회 회전)
  // 역주행(정반대 방향)은 즉시 자기 꼬리와 충돌하므로 건너뛴다.
  while (dirQueue.length) {
    const d = dirQueue.shift();
    if (d.x === dir.x && d.y === dir.y) continue;   // 이미 그 방향
    if (d.x === -dir.x && d.y === -dir.y) continue; // 역주행 금지
    dir = d;
    break;
  }

  // 스프라이트 시트 방향 동기화 (이동 방향에 맞는 행/열 세트 선택)
  duckSprite.setDirFromVector(dir.x, dir.y);

  // 이동 (속도는 가상 해상도 기준 px/초 → 어떤 기기든 동일한 난이도)
  const step = speed * dt;
  duck.x = mod(duck.x + dir.x * step, CONFIG.WORLD_W); // 맵 끝 → 반대편 (벽 통과)
  duck.y = mod(duck.y + dir.y * step, CONFIG.WORLD_H);

  // 카메라가 오리를 부드럽게 추적 (벽 통과 시에도 자연스럽게)
  const k = Math.min(1, CONFIG.CAMERA_FOLLOW * dt);
  cam.x = mod(cam.x + wrapDelta(duck.x - cam.x, CONFIG.WORLD_W) * k, CONFIG.WORLD_W);
  cam.y = mod(cam.y + wrapDelta(duck.y - cam.y, CONFIG.WORLD_H) * k, CONFIG.WORLD_H);

  // 늑대: 엄마 오리를 향해 추격 (지름길 방향)
  for (const w of wolves) {
    const dx = wrapDelta(duck.x - w.x, CONFIG.WORLD_W);
    const dy = wrapDelta(duck.y - w.y, CONFIG.WORLD_H);
    const d = Math.hypot(dx, dy) || 1;
    w.ang = Math.atan2(dy, dx);
    w.x = mod(w.x + (dx / d) * CONFIG.WOLF_SPEED * dt, CONFIG.WORLD_W);
    w.y = mod(w.y + (dy / d) * CONFIG.WOLF_SPEED * dt, CONFIG.WORLD_H);
  }

  // 이동 궤적 기록 (아기 오리들이 이 길을 따라온다)
  trail.unshift({ x: duck.x, y: duck.y, d: step });
  // 필요한 길이만 남기고 잘라내기 (메모리 절약)
  const need = CONFIG.TAIL_SPACING * (rescued + 2);
  let acc = 0;
  for (let i = 0; i < trail.length; i++) {
    acc += trail[i].d;
    if (acc > need) { trail.length = i + 1; break; }
  }

  // 아기 오리 위치 계산
  const tailPos = computeTailPositions();
  const duckScreen = worldToScreen(duck.x, duck.y);

  // ----- 보기 상자 충돌 판정 (벽 통과 지름길 거리 기준) -----
  for (const b of boxes) {
    const dx = wrapDelta(b.cx - duck.x, CONFIG.WORLD_W); // 오리 기준 상대 위치
    const dy = wrapDelta(b.cy - duck.y, CONFIG.WORLD_H);
    if (circleRectHit(0, 0, CONFIG.DUCK_RADIUS, { x: dx - b.w/2, y: dy - b.h/2, w: b.w, h: b.h })) {
      if (b.choice === currentQ.answer) {
        recordAnswer(currentQ.unit, true); // 단원별 정답률 기록
        rescued++;
        gameCorrect++;
        combo++;
        maxCombo = Math.max(maxCombo, combo);
        maxRescued = Math.max(maxRescued, rescued);
        // 점수: 기본 점수 + 콤보 보너스 (연속으로 맞힐수록 커지고, 상한 있음)
        const bonus = Math.min(CONFIG.SCORE_COMBO_BONUS * (combo - 1), CONFIG.SCORE_COMBO_MAX);
        const pts = CONFIG.SCORE_RESCUE + bonus;
        score += pts;
        speed = Math.min(CONFIG.MAX_SPEED, CONFIG.DUCK_SPEED + rescued * CONFIG.SPEED_PER_RESCUE);
        addFeedback(combo >= 2 ? `콤보 x${combo}! +${pts}점` : `+1 구출! +${pts}점`,
          duckScreen.x, duckScreen.y - 34, "#1a9e3f");
      } else {
        recordAnswer(currentQ.unit, false);
        gameWrong++;
        combo = 0; // 오답 → 콤보 끊김
        score = Math.max(0, score - CONFIG.SCORE_WRONG);
        // 첫 번째 문제를 틀리면 바로 게임 오버
        if (questionsAnswered === 0) {
          endGame("첫 번째 문제를 틀렸어요.");
          break;
        }
        // 오답 페널티: 틀린 상자에서 늑대가 튀어나온다!
        spawnWolfAt(b.cx, b.cy);
        // 코앞에서 나온 늑대에게 바로 물리지 않도록 잠깐 무적 (도망갈 시간)
        invulnUntil = Math.max(invulnUntil, gameTime + CONFIG.HIT_INVINCIBLE);
        addFeedback(`틀렸어! -${CONFIG.SCORE_WRONG}점, 늑대 등장!`, duckScreen.x, duckScreen.y - 34, "#d63031");
      }
      questionsAnswered++;
      nextQuestion(); // 정답이든 오답이든 즉시 다음 문제로 (무작위 + 보기 섞기)
      spawnBoxes();
      break;
    }
  }

  // ----- 문제 제한 시간 (1분 30초) -----
  if (state === "playing") {
    questionTimeLeft -= dt;
    if (questionTimeLeft <= 0) {
      recordAnswer(currentQ.unit, false); // 시간 초과 = 오답으로 기록
      gameWrong++;
      combo = 0; // 시간 초과도 콤보 끊김
      score = Math.max(0, score - CONFIG.SCORE_WRONG);
      if (questionsAnswered === 0) {
        // 첫 문제는 시간 초과도 게임 오버 (오답과 같은 규칙)
        endGame("시간 안에 첫 문제를 풀지 못했어요.");
      } else {
        // 오답과 같은 페널티: 틀린 상자 자리에서 늑대가 튀어나온다
        const wrongBox = boxes.find(b => b.choice !== currentQ.answer) || boxes[0];
        spawnWolfAt(wrongBox.cx, wrongBox.cy);
        invulnUntil = Math.max(invulnUntil, gameTime + CONFIG.HIT_INVINCIBLE);
        addFeedback(`시간 초과! -${CONFIG.SCORE_WRONG}점, 늑대 등장!`, duckScreen.x, duckScreen.y - 34, "#d63031");
        questionsAnswered++;
        nextQuestion(); // 제한 시간도 함께 리셋된다
        spawnBoxes();
      }
    }
  }

  // ----- 장애물 충돌 (피격 후 잠깐 무적) -----
  if (gameTime >= invulnUntil) {
    // 바위
    for (const r of rocks) {
      if (worldDist(duck.x, duck.y, r.x, r.y) < CONFIG.DUCK_RADIUS + r.r - 4) {
        hitHazard("rock", "바위에 부딪혔어요...", duckScreen);
        break;
      }
    }
  }
  if (state === "playing" && gameTime >= invulnUntil) {
    // 늑대
    for (const w of wolves) {
      if (worldDist(duck.x, duck.y, w.x, w.y) < CONFIG.DUCK_RADIUS + CONFIG.WOLF_RADIUS - 2) {
        const survived = hitHazard("wolf", "늑대에게 잡혔어요...", duckScreen);
        if (survived) {
          // 아기 오리를 물고 멀리 달아났다가 다른 곳에서 다시 등장
          const p = randomWorldPos(CONFIG.HAZARD_MIN_DIST, rocks, 150);
          w.x = p.x; w.y = p.y;
        }
        break;
      }
    }
  }

  // ----- 자기 꼬리(아기 오리 행렬) 충돌 → 게임 오버 -----
  for (let i = CONFIG.TAIL_SAFE_COUNT; i < tailPos.length; i++) {
    const t = tailPos[i];
    if (worldDist(duck.x, duck.y, t.x, t.y) < CONFIG.DUCK_RADIUS + CONFIG.DUCKLING_RADIUS - 4) {
      endGame("아기 오리 행렬에 부딪혔어요.");
      break;
    }
  }
}

// 게임 오버 공통 처리: 사유 기록 + 랭킹 등록 창 열기
function endGame(reason) {
  gameOverReason = reason;
  state = "gameover";
  showRankPanel();
}

// 틀린 상자에서 늑대가 튀어나온다.
// 이미 최대 마리 수라면 (오리에게서) 가장 먼 늑대가 이 자리로 순간이동.
function spawnWolfAt(x, y) {
  if (wolves.length < CONFIG.MAX_WOLVES) {
    wolves.push({ x, y, ang: 0 });
    return;
  }
  let farthest = wolves[0], fd = -1;
  for (const w of wolves) {
    const d = worldDist(duck.x, duck.y, w.x, w.y);
    if (d > fd) { fd = d; farthest = w; }
  }
  farthest.x = x; farthest.y = y;
}

// 장애물 피격 공통 처리.
// 늑대(kind="wolf"): 아기 오리의 1/5(올림)이 잡혀가거나 뿔뿔이 도망친다.
//   → 5마리 이하일 때는 자동으로 1마리만 잃는다. (예: 5마리→1, 8마리→2, 12마리→3)
// 바위(kind="rock"): 1마리만 잃는다.
// 잃은 마리 수만큼 점수도 깎인다. 아기 오리가 한 마리도 없으면 게임 오버.
// 살아남았으면 true를 반환.
function hitHazard(kind, overReason, duckScreen) {
  if (rescued <= 0) {
    endGame(overReason);
    return false;
  }
  const lost = kind === "wolf" ? Math.ceil(rescued / CONFIG.WOLF_STEAL_DIV) : 1;
  for (let i = 0; i < lost; i++) loseDuckling(); // 잃는 연출도 마리 수만큼
  const pts = lost * CONFIG.SCORE_LOST_DUCK;
  score = Math.max(0, score - pts);
  invulnUntil = gameTime + CONFIG.HIT_INVINCIBLE;
  addFeedback(
    kind === "wolf" ? `늑대에게 ${lost}마리 뺏김! -${pts}점` : `쿵! 아기 오리 -1 · -${pts}점`,
    duckScreen.x, duckScreen.y - 34, "#d63031");
  return true;
}

// 행렬 맨 끝의 아기 오리 1마리를 잃는다. 그 자리에서 떠내려가는 연출을 남긴다.
// 잃을 오리가 없으면 false.
function loseDuckling() {
  if (rescued <= 0) return false;
  const tp = computeTailPositions();
  const lastPos = tp[tp.length - 1] || duck;
  rescued--;
  lostDucks.push({ x: lastPos.x, y: lastPos.y, age: 0 });
  return true;
}

// 궤적을 따라 TAIL_SPACING 간격으로 아기 오리들을 배치
function computeTailPositions() {
  const pos = [];
  let target = CONFIG.TAIL_SPACING;
  let acc = 0;
  for (let i = 0; i < trail.length && pos.length < rescued; i++) {
    acc += trail[i].d;
    while (acc >= target && pos.length < rescued) {
      pos.push({ x: trail[i].x, y: trail[i].y });
      target += CONFIG.TAIL_SPACING;
    }
  }
  // 궤적이 아직 짧으면(방금 구출) 맨 끝에 겹쳐 두었다가 자연스럽게 풀려나온다
  while (pos.length < rescued) {
    const last = trail.length ? trail[trail.length - 1] : duck;
    pos.push({ x: last.x, y: last.y });
  }
  return pos;
}

function circleRectHit(cx, cy, r, b) {
  const nx = Math.max(b.x, Math.min(cx, b.x + b.w));
  const ny = Math.max(b.y, Math.min(cy, b.y + b.h));
  return (cx - nx) ** 2 + (cy - ny) ** 2 <= r * r;
}

/* ============================================================
 * [10] 실시간 피드백 텍스트 — 화면 좌표 기준
 * ============================================================ */
function addFeedback(text, x, y, color) {
  // 화면 밖으로 잘리지 않게 위치 보정
  x = Math.max(120, Math.min(CONFIG.W - 120, x));
  y = Math.max(CONFIG.UI_TOP + 50, Math.min(CONFIG.H - 30, y));
  feedbacks.push({ text, x, y, color, age: 0 });
}

function updateFeedbacks(dt) {
  for (const f of feedbacks) { f.age += dt; f.y -= 45 * dt; }
  feedbacks = feedbacks.filter(f => f.age < CONFIG.FEEDBACK_LIFE);
  for (const l of lostDucks) l.age += dt;
  lostDucks = lostDucks.filter(l => l.age < CONFIG.LOST_DUCK_LIFE);
}

/* ============================================================
 * [11] 그리기 (외부 이미지 없이 Canvas 기본 도형만 사용)
 * ============================================================ */
function render(time) {
  drawWater(time);

  if (state === "start") { drawStartScreen(); return; }

  const q = currentQ;

  // ----- 바위 -----
  for (const r of rocks) {
    const s = worldToScreen(r.x, r.y);
    if (s.x > -50 && s.x < CONFIG.W + 50 && s.y > CONFIG.UI_TOP - 50 && s.y < CONFIG.H + 50) {
      drawRock(s.x, s.y, r.r);
    }
  }

  // ----- 보기 상자 (화면 안: 상자 그리기 / 화면 밖: 가장자리 화살표) -----
  for (const b of boxes) {
    const s = worldToScreen(b.cx, b.cy);
    const onScreen =
      s.x > -b.w && s.x < CONFIG.W + b.w &&
      s.y > CONFIG.UI_TOP - 20 && s.y < CONFIG.H + b.h;
    if (onScreen) drawBox(b, s, q.choices[b.choice]);
    else          drawEdgeArrow(s, q.choices[b.choice], time, "#ff8c00");
  }

  // ----- 늑대 (화면 밖이라도 가까이 오면 빨간 경고 화살표) -----
  for (const w of wolves) {
    const s = worldToScreen(w.x, w.y);
    const onScreen =
      s.x > -40 && s.x < CONFIG.W + 40 &&
      s.y > CONFIG.UI_TOP - 40 && s.y < CONFIG.H + 40;
    if (onScreen) drawWolf(s.x, s.y, CONFIG.WOLF_RADIUS, w.ang, time);
    else if (worldDist(duck.x, duck.y, w.x, w.y) < CONFIG.WOLF_WARN_DIST) {
      drawEdgeArrow(s, "늑대!", time, "#e03131");
    }
  }

  // ----- 아기 오리 행렬 (baby_duck.png 스프라이트) -----
  const tailPos = computeTailPositions();
  for (let i = tailPos.length - 1; i >= 0; i--) {
    const t = tailPos[i];
    const ahead = i === 0 ? duck : tailPos[i - 1];
    const dxw = wrapDelta(ahead.x - t.x, CONFIG.WORLD_W);
    const dyw = wrapDelta(ahead.y - t.y, CONFIG.WORLD_H);
    // 앞 오리를 향하는 방향을 상하좌우 4방향으로 변환 → 시트의 해당 칸 사용
    const dn = Math.abs(dxw) >= Math.abs(dyw)
      ? (dxw < 0 ? "left" : "right")
      : (dyw < 0 ? "up" : "down");
    const s = worldToScreen(t.x, t.y);
    const bob = Math.sin(time * 5 + i) * 2; // 둥실둥실
    if (!babySprite.draw(ctx, s.x, s.y + bob, CONFIG.SPRITE.BABY_DRAW_H, dn, i)) {
      // 이미지 로드 전에는 기존 도형 오리로 폴백
      drawDuckShape(s.x, s.y + bob, CONFIG.DUCKLING_RADIUS, "#ffe9a8", Math.atan2(dyw, dxw));
    }
  }

  // ----- 잃은 아기 오리 (흔들흔들 떠내려가며 사라짐) -----
  for (const l of lostDucks) {
    const s = worldToScreen(l.x, l.y);
    const a = 1 - l.age / CONFIG.LOST_DUCK_LIFE;
    const lx = s.x + Math.sin(l.age * 6) * 8; // 좌우로 흔들흔들
    const ly = s.y + l.age * 28;              // 아래로 떠내려감
    ctx.globalAlpha = Math.max(0, a) * 0.9;
    if (!babySprite.draw(ctx, lx, ly, CONFIG.SPRITE.BABY_DRAW_H, "down")) {
      drawDuckShape(lx, ly, CONFIG.DUCKLING_RADIUS, "#ffe9a8", l.age * 5);
    }
    ctx.globalAlpha = 1;
  }

  // ----- 엄마 오리 (스프라이트 시트 크롭 / 피격 무적 중에는 깜빡깜빡) -----
  const ds = worldToScreen(duck.x, duck.y);
  const invincible = state === "playing" && gameTime < invulnUntil;
  if (!invincible || Math.floor(time * 8) % 2 === 0) {
    ctx.globalAlpha = invincible ? 0.6 : 1;
    if (!duckSprite.draw(ctx, ds.x, ds.y, CONFIG.SPRITE.DRAW_H)) {
      // 이미지 로드 전에는 기존 도형 오리로 폴백
      drawDuckShape(ds.x, ds.y, CONFIG.DUCK_RADIUS, "#ffd21f", Math.atan2(dir.y, dir.x));
    }
    ctx.globalAlpha = 1;
  }

  // ----- 피드백 텍스트 -----
  for (const f of feedbacks) {
    const a = 1 - f.age / CONFIG.FEEDBACK_LIFE;
    ctx.globalAlpha = Math.max(0, a);
    ctx.font = `bold 34px ${FONT}`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.lineWidth = 6; ctx.strokeStyle = "#ffffff";
    ctx.strokeText(f.text, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
    ctx.globalAlpha = 1;
  }

  // ----- 상단 질문 UI -----
  drawTopBar(q);

  // ----- 가상 방향키 (터치 기기, 플레이 중에만) -----
  if (state === "playing" && SHOW_DPAD) drawDpad(time);

  if (state === "gameover") drawGameOverScreen();
  else if (state === "paused") drawPauseScreen();
}

// 반투명 십자 방향 패드 — 화면 오른쪽 아래, 게임을 가리지 않게 은은하게
function drawDpad(time) {
  const B = CONFIG.DPAD.BTN;
  for (const d of DPAD_DIRS) {
    const c = dpadBtnCenter(d);
    const pressed = dpadFlash.dir === d && time < dpadFlash.until;
    ctx.globalAlpha = pressed ? 0.85 : CONFIG.DPAD.ALPHA;
    ctx.fillStyle = pressed ? "#ffd21f" : "#ffffff";
    roundRect(c.x - B / 2, c.y - B / 2, B, B, 12); ctx.fill();
    ctx.strokeStyle = "#16324a"; ctx.lineWidth = 2;
    roundRect(c.x - B / 2, c.y - B / 2, B, B, 12); ctx.stroke();
    // 방향 화살표 (삼각형)
    ctx.fillStyle = "#16324a";
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(Math.atan2(d.y, d.x));
    ctx.beginPath();
    ctx.moveTo(11, 0); ctx.lineTo(-7, -11); ctx.lineTo(-7, 11);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawWater(time) {
  ctx.fillStyle = "#7ec8e3";
  ctx.fillRect(0, 0, CONFIG.W, CONFIG.H);
  // 월드에 고정된 잔물결·연잎 (카메라 이동이 눈에 보이게 하는 기준점)
  for (const d of DECOR) {
    const s = worldToScreen(d.x, d.y);
    if (s.x < -30 || s.x > CONFIG.W + 30 || s.y < -30 || s.y > CONFIG.H + 30) continue;
    if (d.lily) {
      // 연잎
      ctx.fillStyle = "#5aa25e";
      ctx.beginPath(); ctx.arc(s.x, s.y, 20, 0.25, Math.PI * 2 - 0.25); ctx.lineTo(s.x, s.y); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = "rgba(30,80,40,0.5)"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(s.x, s.y, 20, 0.25, Math.PI * 2 - 0.25); ctx.stroke();
    } else {
      // 잔물결
      const ph = Math.sin(time * 1.5 + d.seed) * 4;
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(s.x, s.y + ph, 14, Math.PI * 0.15, Math.PI * 0.85);
      ctx.stroke();
    }
  }
}

function drawBox(b, s, label) {
  const x = s.x - b.w / 2, y = s.y - b.h / 2;
  // 상자 본체
  ctx.fillStyle = "#b07a3c";
  roundRect(x, y, b.w, b.h, 8); ctx.fill();
  ctx.strokeStyle = "#7a5023"; ctx.lineWidth = 3;
  roundRect(x, y, b.w, b.h, 8); ctx.stroke();
  // 리본
  ctx.fillStyle = "#7a5023";
  ctx.fillRect(x + b.w/2 - 5, y, 10, b.h);
  ctx.fillRect(x, y + b.h/2 - 5, b.w, 10);
  // 보기 글씨 (상자 위, 흰 테두리로 가독성 확보. 길면 자동 축소)
  fitFontSize(label, CONFIG.BOX_LABEL_FONT, 360, 15);
  const half = ctx.measureText(label).width / 2 + 6;
  const lx = Math.max(half, Math.min(CONFIG.W - half, s.x)); // 화면 밖으로 잘리지 않게
  const ly = Math.max(CONFIG.UI_TOP + 30, y - 8);            // 상단 UI에 가려지지 않게
  ctx.textAlign = "center"; ctx.textBaseline = "bottom";
  ctx.lineWidth = 5; ctx.strokeStyle = "#ffffff";
  ctx.strokeText(label, lx, ly);
  ctx.fillStyle = "#233b52";
  ctx.fillText(label, lx, ly);
}

function drawRock(x, y, r) {
  ctx.fillStyle = "#8d99ae";
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#5c6672"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
  // 밝은 면 (입체감)
  ctx.fillStyle = "#aab4c4";
  ctx.beginPath(); ctx.arc(x - r * 0.28, y - r * 0.3, r * 0.5, 0, Math.PI * 2); ctx.fill();
  // 갈라진 금
  ctx.strokeStyle = "rgba(60,70,85,0.6)"; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - r * 0.1, y - r * 0.7);
  ctx.lineTo(x + r * 0.2, y - r * 0.1);
  ctx.lineTo(x - r * 0.15, y + r * 0.5);
  ctx.stroke();
}

function drawWolf(x, y, r, angle, time) {
  const lunge = Math.sin(time * 8) * 1.5; // 성큼성큼 달리는 느낌
  ctx.save();
  ctx.translate(x + Math.cos(angle) * lunge, y + Math.sin(angle) * lunge);
  ctx.rotate(angle);
  // 귀 (몸통 뒤에 먼저)
  ctx.fillStyle = "#4b5563";
  ctx.beginPath();
  ctx.moveTo(-r * 0.55, -r * 0.5); ctx.lineTo(-r * 0.25, -r * 1.5); ctx.lineTo(r * 0.05, -r * 0.55);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-r * 0.55, r * 0.5); ctx.lineTo(-r * 0.25, r * 1.5); ctx.lineTo(r * 0.05, r * 0.55);
  ctx.closePath(); ctx.fill();
  // 몸통
  ctx.fillStyle = "#6b7280";
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "#374151"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
  // 주둥이
  ctx.fillStyle = "#9ca3af";
  ctx.beginPath(); ctx.arc(r * 0.62, 0, r * 0.42, 0, Math.PI * 2); ctx.fill();
  // 코
  ctx.fillStyle = "#1f2937";
  ctx.beginPath(); ctx.arc(r * 0.98, 0, r * 0.16, 0, Math.PI * 2); ctx.fill();
  // 눈 (양쪽)
  ctx.fillStyle = "#fbbf24";
  ctx.beginPath(); ctx.arc(r * 0.2, -r * 0.42, r * 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.2,  r * 0.42, r * 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#111";
  ctx.beginPath(); ctx.arc(r * 0.28, -r * 0.42, r * 0.09, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.28,  r * 0.42, r * 0.09, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

/* 화면 밖 대상 안내: 가장자리에 화살표 + 라벨 표시 (상자=주황, 늑대=빨강) */
function drawEdgeArrow(s, label, time, color) {
  const dx = s.x - VIEW_CX, dy = s.y - VIEW_CY;
  if (dx === 0 && dy === 0) return;
  // 화면 안쪽 경계 사각형과 (화면중심→대상) 방향선의 교점 찾기
  const m = CONFIG.ARROW_EDGE_MARGIN;
  let t = Infinity;
  if (dx > 0) t = Math.min(t, (CONFIG.W - m - VIEW_CX) / dx);
  if (dx < 0) t = Math.min(t, (m - VIEW_CX) / dx);
  if (dy > 0) t = Math.min(t, (CONFIG.H - m - VIEW_CY) / dy);
  if (dy < 0) t = Math.min(t, (CONFIG.UI_TOP + m - VIEW_CY) / dy);
  if (!isFinite(t) || t <= 0) return;
  const ax = VIEW_CX + dx * t;
  const ay = VIEW_CY + dy * t;
  const ang = Math.atan2(dy, dx);
  const pulse = 1 + Math.sin(time * 6) * 0.12; // 콩닥콩닥 강조

  // 화살표 (삼각형)
  ctx.save();
  ctx.translate(ax, ay);
  ctx.rotate(ang);
  ctx.scale(pulse, pulse);
  ctx.fillStyle = color;
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(18, 0);
  ctx.lineTo(-12, -13);
  ctx.lineTo(-5, 0);
  ctx.lineTo(-12, 13);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();

  // 라벨 (화살표에서 화면 안쪽으로 살짝 들어온 위치, 알약 배경. 길면 자동 축소)
  fitFontSize(label, CONFIG.ARROW_LABEL_FONT, 300, 13);
  const tw = ctx.measureText(label).width;
  const pillW = tw + 22, pillH = 30;
  let lx = ax - Math.cos(ang) * (pillW / 2 + 30);
  let ly = ay - Math.sin(ang) * (pillH / 2 + 26);
  lx = Math.max(pillW / 2 + 6, Math.min(CONFIG.W - pillW / 2 - 6, lx));
  ly = Math.max(CONFIG.UI_TOP + pillH / 2 + 6, Math.min(CONFIG.H - pillH / 2 - 6, ly));
  ctx.fillStyle = "rgba(255,255,255,0.92)";
  roundRect(lx - pillW / 2, ly - pillH / 2, pillW, pillH, 15); ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  roundRect(lx - pillW / 2, ly - pillH / 2, pillW, pillH, 15); ctx.stroke();
  ctx.fillStyle = "#233b52";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(label, lx, ly + 1);
}

function drawDuckShape(x, y, r, bodyColor, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  // 몸통
  ctx.fillStyle = bodyColor;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "rgba(120,80,0,0.4)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
  // 부리 (진행 방향)
  ctx.fillStyle = "#f5820b";
  ctx.beginPath();
  ctx.moveTo(r * 0.55, -r * 0.35);
  ctx.lineTo(r * 1.55, 0);
  ctx.lineTo(r * 0.55, r * 0.35);
  ctx.closePath(); ctx.fill();
  // 눈
  ctx.fillStyle = "#222";
  ctx.beginPath(); ctx.arc(r * 0.3, -r * 0.4, Math.max(2, r * 0.16), 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawTopBar(q) {
  ctx.fillStyle = "rgba(22,50,74,0.92)";
  ctx.fillRect(0, 0, CONFIG.W, CONFIG.UI_TOP);
  ctx.fillStyle = "#ffd21f";
  ctx.fillRect(0, CONFIG.UI_TOP - 4, CONFIG.W, 4);

  // 질문 (길면 자동으로 2줄 + 글씨 축소)
  drawQuestionText(q.text);

  // 하단 정보줄: 왼쪽 = 현재 단원·누적 정답률, 오른쪽 = 구출 수
  const u = UNITS[q.unit];
  const s = stats[String(q.unit)];
  const pct = s && s.t > 0 ? `정답률 ${Math.round(s.c / s.t * 100)}%` : "정답률 --";
  ctx.textBaseline = "middle";
  ctx.font = `bold 16px ${FONT}`;
  ctx.textAlign = "left";
  ctx.fillStyle = "#9ecbe8";

  ctx.textAlign = "right";
  ctx.fillStyle = "#ffe9a8";
  const comboTag = combo >= 2 ? ` · 콤보 x${combo}` : "";
  ctx.fillText(`점수 ${score}${comboTag} · 오리 ${rescued}마리`, CONFIG.W - 14, CONFIG.UI_TOP - 18);

  // 가운데 = 남은 시간 (10초 이하면 빨갛게 깜빡이며 경고)
  const t = Math.max(0, Math.ceil(questionTimeLeft));
  const mm = Math.floor(t / 60), ss = String(t % 60).padStart(2, "0");
  const danger = questionTimeLeft <= CONFIG.TIME_WARN;
  ctx.textAlign = "center";
  ctx.font = `bold 18px ${FONT}`;
  ctx.fillStyle = danger
    ? (Math.floor(questionTimeLeft * 3) % 2 === 0 ? "#ff6b6b" : "#ffd21f")
    : "#ffffff";
  ctx.fillText(`⏱ ${mm}:${ss}`, CONFIG.W / 2, CONFIG.UI_TOP - 18);
}

// 질문을 1~2줄로 자동 배치: 한 줄로 안 들어가면 가운데 공백에서 나누고,
// 그래도 넘치면 폭에 맞을 때까지 글씨를 줄인다.
function drawQuestionText(text) {
  const maxW = CONFIG.W - 30;
  const full = "Q. " + text;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "#ffffff";
  ctx.font = `bold 24px ${FONT}`;
  if (ctx.measureText(full).width <= maxW) {
    ctx.fillText(full, CONFIG.W / 2, 38);
    return;
  }
  // 가운데에서 가장 가까운 공백을 찾아 두 줄로 분리
  let bestIdx = -1, bestDist = Infinity;
  const mid = full.length / 2;
  for (let i = 0; i < full.length; i++) {
    if (full[i] === " ") {
      const d = Math.abs(i - mid);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
  }
  let l1 = full, l2 = "";
  if (bestIdx > 0) { l1 = full.slice(0, bestIdx); l2 = full.slice(bestIdx + 1); }
  let font = 22;
  ctx.font = `bold ${font}px ${FONT}`;
  while (font > 14 && Math.max(ctx.measureText(l1).width, ctx.measureText(l2).width) > maxW) {
    font--;
    ctx.font = `bold ${font}px ${FONT}`;
  }
  ctx.fillText(l1, CONFIG.W / 2, 25);
  ctx.fillText(l2, CONFIG.W / 2, 52);
}

// 글씨가 maxW보다 넓으면 min까지 크기를 줄여 맞춘다 (ctx.font 설정 후 크기 반환)
function fitFontSize(text, base, maxW, min) {
  let s = base;
  ctx.font = `bold ${s}px ${FONT}`;
  while (s > min && ctx.measureText(text).width > maxW) {
    s--;
    ctx.font = `bold ${s}px ${FONT}`;
  }
  return s;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawButton(b) {
  if (b.small) {
    // 보조 버튼 (기록 초기화 등): 작고 차분한 스타일
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    roundRect(b.x, b.y, b.w, b.h, 10); ctx.fill();

    roundRect(b.x, b.y, b.w, b.h, 10); ctx.stroke();

    ctx.fillStyle = "#33475c";
    ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2 + 1);
    return;
  }
  ctx.fillStyle = "#ffd21f";
  roundRect(b.x, b.y, b.w, b.h, 14); ctx.fill();
  ctx.strokeStyle = "#b8860b"; ctx.lineWidth = 4;
  roundRect(b.x, b.y, b.w, b.h, 14); ctx.stroke();
  ctx.font = `bold 30px ${FONT}`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "#5a3d00";
  ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2 + 2);
}

/* ============================================================
 * [RANK] 랭킹 — Google Apps Script(스프레드시트) 연동
 *   같은 폴더의 ranking_appscript.gs를 배포한 뒤 그 웹 앱 URL을
 *   CONFIG.RANKING_URL에 넣으면 작동한다.
 *
 *   조작 방지(가벼운 이중 잠금):
 *   ① 클라이언트: 제출값을 요약한 검증 토큰을 함께 보낸다.
 *      주소만 알아내 임의의 값을 쏘는 장난을 걸러 준다.
 *   ② 서버(.gs): "정답 수보다 구출 수가 많다" 같은 말이 안 되는
 *      기록만 거르는 상식 검사 + 15초 재제출 쿨다운.
 *   정상적으로 플레이한 기록은 절대 걸리지 않도록 기준을 아주
 *   널널하게 잡았다. (완벽한 보안이 아니라 '장난 방지' 수준)
 * ============================================================ */
const rankPanel = document.getElementById("rank-panel");
const rankSummary = document.getElementById("rank-summary");
const rankStep1 = document.getElementById("rank-step1");
const rankStep2 = document.getElementById("rank-step2");
const rankNick = document.getElementById("rank-nick");
const rankConfirmText = document.getElementById("rank-confirm-text");
const rankStatus = document.getElementById("rank-status");
const boardPanel = document.getElementById("board-panel");
const boardTabs = document.getElementById("board-tabs");
const boardNote = document.getElementById("board-note");
const boardList = document.getElementById("board-list");

const RANK_SECRET = "DUCK-POND-2026"; // ranking_appscript.gs의 SECRET과 반드시 같아야 함
let rankSubmitted = false; // 한 판에 한 번만 등록

// 제출값 요약 토큰 (서버와 같은 계산식)
function makeToken(p) {
  const s = `${p.nick}|${p.score}|${p.maxCombo}|${p.maxRescued}|${p.gameCorrect}|${RANK_SECRET}`;
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return h.toString(36);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function showRankPanel() {
  rankSubmitted = false;
  const dur = Math.round((Date.now() - gameStartMs) / 1000);
  rankSummary.innerHTML =
    `점수 <b>${score}점</b> · 최다 구출 <b>${maxRescued}마리</b> · 최고 콤보 <b>${maxCombo}연속</b><br>` +
    `정답 ${gameCorrect} · 오답 ${gameWrong} · 플레이 ${dur}초`;
  rankStep1.style.display = "";
  rankStep2.style.display = "none";
  rankStatus.textContent = CONFIG.RANKING_URL
    ? "" : "※ 아직 랭킹 서버가 연결되지 않았어요. (선생님: CONFIG.RANKING_URL 설정)";
  rankPanel.classList.remove("hidden");
}
function hideRankPanel() { rankPanel.classList.add("hidden"); }
function hideBoardPanel() { boardPanel.classList.add("hidden"); }

// 닉네임 검사: 길이 + 전화번호 의심 숫자 + 위험 문자
function validNick(n) {
  if (n.length < 2 || n.length > 10) return "닉네임은 2~10자로 지어 주세요.";
  if (/\d{7,}/.test(n)) return "전화번호처럼 보이는 긴 숫자는 쓸 수 없어요.";
  if (/[<>"'\\]/.test(n)) return "< > \" ' 같은 특수문자는 쓸 수 없어요.";
  return null;
}

// 1단계: 등록 버튼 → 개인정보 재확인(2단계)으로
document.getElementById("rank-submit1").addEventListener("click", () => {
  const nick = rankNick.value.trim();
  const err = validNick(nick);
  if (err) { rankStatus.textContent = err; return; }
  rankConfirmText.innerHTML =
    `정말 <b>"${escapeHtml(nick)}"</b>(으)로 등록할까요?<br>` +
    `닉네임에 <b>이름·전화번호 등 개인정보</b>가 없는지 한 번 더 확인해 주세요!`;
  rankStep1.style.display = "none";
  rankStep2.style.display = "";
  rankStatus.textContent = "";
});
document.getElementById("rank-back").addEventListener("click", () => {
  rankStep2.style.display = "none";
  rankStep1.style.display = "";
});
document.getElementById("rank-close1").addEventListener("click", hideRankPanel);

// 2단계: 최종 등록
document.getElementById("rank-submit2").addEventListener("click", async () => {
  if (rankSubmitted) return;
  if (!CONFIG.RANKING_URL) {
    rankStatus.textContent = "랭킹 서버가 아직 연결되지 않아 등록할 수 없어요.";
    return;
  }
  const nick = rankNick.value.trim();
  const btn = document.getElementById("rank-submit2");
  btn.disabled = true;
  rankStatus.textContent = "등록하는 중...";
  const p = {
    nick, score, maxCombo, maxRescued, gameCorrect, gameWrong,
    duration: Math.round((Date.now() - gameStartMs) / 1000),
    // 누적 단원별 정답률 (localStorage 기록) — 정답률 랭킹용
    units: [0, 1, 2].map(i => {
      const s = stats[String(i)] || { c: 0, t: 0 };
      return [s.c, s.t];
    }),
  };
  p.token = makeToken(p);
  try {
    // Content-Type을 지정하지 않아야(단순 요청) Apps Script에 CORS 문제없이 도달한다
    const res = await fetch(CONFIG.RANKING_URL, { method: "POST", body: JSON.stringify(p) });
    const j = await res.json();
    if (j.ok) {
      rankSubmitted = true;
      rankStep2.style.display = "none";
      rankStatus.textContent = "등록 완료! 🏆 왼쪽 아래 '랭킹' 버튼에서 확인해 보세요.";
      boardCache = null; // 다음에 랭킹 열 때 새로 불러오도록
    } else {
      rankStatus.textContent = "등록 실패: " + (j.reason || "알 수 없는 오류");
      btn.disabled = false;
    }
  } catch (e) {
    rankStatus.textContent = "서버에 연결할 수 없어요. 인터넷 연결을 확인해 주세요.";
    btn.disabled = false;
  }
});

/* ---- 명예의 전당 (랭킹 보기) ---- */
const BOARD_DEFS = [
  { key: "score",   label: "점수",        fmt: e => `${e.v}점` },
  { key: "rescued", label: "최다 구출",   fmt: e => `${e.v}마리` },
  { key: "combo",   label: "연속 구출",   fmt: e => `${e.v}연속` },
  { key: "total",   label: "전체 정답률", fmt: e => `${e.v}% (${e.c}/${e.t})`, note: "전체 문제를 50문제 이상 푼 사람만 올라가요." },
  { key: "u0",      label: "1단원",       fmt: e => `${e.v}% (${e.c}/${e.t})`, note: "이 단원 문제를 30문제 이상 푼 사람만 올라가요." },
  { key: "u1",      label: "2단원",       fmt: e => `${e.v}% (${e.c}/${e.t})`, note: "이 단원 문제를 30문제 이상 푼 사람만 올라가요." },
  { key: "u2",      label: "3단원",       fmt: e => `${e.v}% (${e.c}/${e.t})`, note: "이 단원 문제를 30문제 이상 푼 사람만 올라가요." },
];
let boardTab = "score";
let boardCache = null, boardCacheAt = 0;

function renderBoardTabs() {
  boardTabs.innerHTML = "";
  for (const d of BOARD_DEFS) {
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = d.label;
    if (d.key === boardTab) b.classList.add("on");
    b.addEventListener("click", () => { boardTab = d.key; renderBoardTabs(); renderBoardList(); });
    boardTabs.appendChild(b);
  }
}

function renderBoardList() {
  const def = BOARD_DEFS.find(d => d.key === boardTab);
  boardNote.textContent = def.note || "";
  if (!CONFIG.RANKING_URL) {
    boardList.textContent = "아직 랭킹 서버가 연결되지 않았어요. (선생님: CONFIG.RANKING_URL 설정)";
    return;
  }
  if (!boardCache) { boardList.textContent = "불러오는 중..."; return; }
  const entries = (boardCache.boards && boardCache.boards[boardTab]) || [];
  if (!entries.length) { boardList.textContent = "아직 기록이 없어요. 1등의 주인공이 되어 보세요!"; return; }
  const medals = ["🥇", "🥈", "🥉"];
  boardList.innerHTML = "<ol>" + entries.map((e, i) =>
    `<li>${medals[i] || ""} <b>${escapeHtml(e.n)}</b> — ${def.fmt(e)}</li>`
  ).join("") + "</ol>";
}

async function openBoardPanel(forceReload) {
  boardPanel.classList.remove("hidden");
  renderBoardTabs();
  renderBoardList();
  if (!CONFIG.RANKING_URL) return;
  if (!forceReload && boardCache && Date.now() - boardCacheAt < 60000) return; // 1분 캐시
  boardCache = null;
  renderBoardList();
  try {
    const res = await fetch(CONFIG.RANKING_URL + "?action=board");
    boardCache = await res.json();
    boardCacheAt = Date.now();
  } catch (e) {
    boardList.textContent = "랭킹을 불러오지 못했어요. 잠시 후 다시 시도해 주세요.";
    return;
  }
  renderBoardList();
}

document.getElementById("board-open").addEventListener("click", () => openBoardPanel(false));
document.getElementById("board-refresh").addEventListener("click", () => openBoardPanel(true));
document.getElementById("board-close").addEventListener("click", hideBoardPanel);

/* ============================================================
 * [12] 메인 루프 (dt 기반 → 기기 성능과 무관하게 동일 속도)
 * ============================================================ */
let last = performance.now();
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.05); // 탭 전환 등 큰 dt 방지
  last = now;
  if (state === "playing") update(dt);
  duckSprite.update(dt); // 걷기 프레임 순환 (시작 화면 장식 오리도 함께 움직임)
  babySprite.update(dt); // 아기 오리 걷기 프레임 순환
  updateFeedbacks(dt);
  render(now / 1000);
  requestAnimationFrame(frame);
}

initGame();          // 시작 화면 뒤 배경용 초기화
state = "start";
requestAnimationFrame(frame);
</script>
